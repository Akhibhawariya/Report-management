services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: report_mgmt
    # Host port defaults to 5433 when something else (e.g. another Postgres) uses 5432.
    # Override: POSTGRES_HOST_PORT=5432 docker compose up
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Host port defaults to 6380 to avoid clashing with a local Redis on 6379.
    # Override: REDIS_HOST_PORT=6379 docker compose up
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

  api:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/report_mgmt
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      UPLOADS_DIR: /app/uploads
      PORT: "4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: ["node", "src/workers/csvImportWorker.js"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/report_mgmt
      REDIS_URL: redis://redis:6379
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
